spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fcstreamtube}
    username: ${SPRING_DATASOURCE_USERNAME:fcstreamtube}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

  mvc:
    problem-details:
      enabled: true

app:
  mail:
    from: ${APP_MAIL_FROM:noreply@fcstreamtube.com}
  jwt:
    secret: ${APP_JWT_SECRET:dev-only-secret-key-for-hmac-sha256-min32}
    expiration-seconds: 3600
